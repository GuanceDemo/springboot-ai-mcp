<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpringBoot AI Codex</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f2efe8 0%, #d7e8f2 48%, #f6d7c3 100%);
            --panel: rgba(255, 252, 248, 0.82);
            --border: rgba(29, 53, 87, 0.15);
            --text: #1d3557;
            --muted: #5f6f81;
            --accent: #d76c42;
            --accent-dark: #ac4f2b;
            --user: #1d3557;
            --assistant: #f3e4d6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 16px 50px rgba(29, 53, 87, 0.08);
        }

        .headline {
            padding: 28px;
        }

        .headline h1 {
            margin: 0 0 12px;
            font-size: clamp(32px, 5vw, 58px);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .headline p,
        .meta p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .meta {
            padding: 28px;
            display: grid;
            gap: 12px;
            align-content: start;
        }

        .tag {
            display: inline-flex;
            width: fit-content;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(215, 108, 66, 0.12);
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .chat {
            padding: 24px;
        }

        .messages {
            display: grid;
            gap: 14px;
            min-height: 420px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 20px;
        }

        .bubble {
            border-radius: 20px;
            padding: 16px 18px;
            line-height: 1.7;
            animation: rise 0.25s ease;
            white-space: pre-wrap;
        }

        .user {
            margin-left: auto;
            max-width: 78%;
            background: var(--user);
            color: #fff;
        }

        .assistant {
            max-width: 85%;
            background: var(--assistant);
        }

        .composer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            resize: vertical;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.7);
            color: var(--text);
            font: inherit;
        }

        button {
            border: 0;
            border-radius: 18px;
            min-width: 140px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            background: var(--accent-dark);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .composer {
                grid-template-columns: 1fr;
            }

            button {
                min-height: 54px;
            }
        }
    </style>
</head>
<body>
<div id="app" class="shell">
    <section class="hero">
        <div class="card headline">
            <span class="tag">Spring Boot AI Agent</span>
            <h1>SpringBoot AI Codex</h1>
            <p>后端基于 Spring AI Agent + ZhipuAI + Guance MCP，前端提供一个可直接嵌入项目的 Vue 聊天界面。</p>
        </div>
        <div class="card meta">
            <p><strong>默认模型：</strong>{{ model }}</p>
            <p><strong>默认供应商：</strong>{{ provider }}</p>
            <p><strong>接口：</strong>POST /api/chat</p>
            <p><strong>说明：</strong>问题涉及日志、监控、仪表板、DQL 等观测云场景时，Agent 会优先调用观测云 MCP 工具。</p>
        </div>
    </section>

    <section class="card chat">
        <div class="messages">
            <div v-for="item in messages" :key="item.id" class="bubble" :class="item.role">
                {{ item.content }}
            </div>
        </div>

        <div class="composer">
            <textarea v-model="prompt" placeholder="输入你的问题，例如：帮我设计一个可扩展的 Agent 调度流程"></textarea>
            <button @click="send" :disabled="loading || !prompt.trim()">
                {{ loading ? '处理中...' : '发送消息' }}
            </button>
        </div>
    </section>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                provider: 'zhipu',
                model: 'glm-4-flash',
                prompt: '',
                loading: false,
                conversationId: '',
                messages: [
                    {
                        id: crypto.randomUUID(),
                        role: 'assistant',
                        content: '我是 SpringBoot AI Codex Agent。你可以直接提问；涉及观测云日志、监控器、仪表板、DQL 的问题会优先走 Guance MCP。'
                    }
                ]
            };
        },
        methods: {
            async send() {
                const content = this.prompt.trim();
                if (!content || this.loading) {
                    return;
                }

                this.messages.push({
                    id: crypto.randomUUID(),
                    role: 'user',
                    content
                });
                this.prompt = '';
                this.loading = true;

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: content,
                            conversationId: this.conversationId
                        })
                    });

                    if (!response.ok) {
                        throw new Error('请求失败，状态码 ' + response.status);
                    }

                    const data = await response.json();
                    this.provider = data.provider || this.provider;
                    this.model = data.model || this.model;
                    this.conversationId = data.conversationId || this.conversationId;
                    this.messages.push({
                        id: crypto.randomUUID(),
                        role: 'assistant',
                        content: data.reply || '未收到模型回复'
                    });
                } catch (error) {
                    this.messages.push({
                        id: crypto.randomUUID(),
                        role: 'assistant',
                        content: '调用失败：' + error.message
                    });
                } finally {
                    this.loading = false;
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
